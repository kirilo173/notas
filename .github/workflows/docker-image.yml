name: Mi workflow de pyth0n

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Ejecutar tests unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Construir imagen de test
        run: docker build --target test -t notas-api:test .

      - name: Ejecutar tests
        run: docker run --rm notas-api:test

  build-and-push:
    name: Build y push a DockerHub
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Extraer metadatos de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.nombre }}/notas-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-,format=short

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.nombre }}
          password: ${{ secrets.usuario }}

      - name: Build y push imagen
        run: |
          docker build --target production -t ${{ secrets.nombre }}/notas-api:latest .
          docker push ${{ secrets.nombre }}/notas-api:latest
