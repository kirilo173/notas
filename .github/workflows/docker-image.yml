name: Mi workflow de python.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Ejecutar tests unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Construir imagen de test
        run: docker build --target test -t notas-api:test .

      - name: Ejecutar tests
        run: docker run --rm notas-api:test

  build-and-push:
    name: Build y push a DockerHub
    runs-on: ubuntu-latest
    needs: test


    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.nombre }}
          password: ${{ secrets.usuario }}

      - name: Build y push imagen
        run: |
          docker build --target produccion -t ${{ secrets.nombre }}/notas-api:latest .
          docker push ${{ secrets.nombre }}/notas-api:latest
